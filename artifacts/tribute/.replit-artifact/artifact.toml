kind = "web"
previewPath = "/"
title = "هدية خاصة"
version = "1.0.0"
id = "artifacts/tribute"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18911

[services.development]
run = "pnpm --filter @workspace/tribute run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tribute", "run", "build" ]
publicDir = "artifacts/tribute/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18911"
BASE_PATH = "/"
